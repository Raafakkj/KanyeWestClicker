<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanye West Clicker</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
        <section class="left-panel">
            <h1 class="title">Kanye West Clicker!</h1>
            <div class="score-container">
                <h1 id="points">Kanye Points: 0</h1>
            </div>

            <div class="clicker-container">
                <button id="kanye">
                    <img src="assets/kanye/41-414314_transparent-kanye-head-png-kanye-west-head-png.png" alt="Kanye West">
                    <span class="vinyl-core">
                        <span class="vinyl-hole"></span>
                        <span class="vinyl-dot dot-a"></span>
                        <span class="vinyl-dot dot-b"></span>
                        <span class="vinyl-dot dot-c"></span>
                    </span>
                </button>
            </div>
            <div id="buffs-hud" class="buffs-hud"></div>
        </section>

        <aside class="right-panel">
            <h2 class="side-title">Informações.</h2>
            <p class="side-subtitle">Yeezus?</p>
            <div id="items" class="items-list"></div>
            <div class="rebirth-card">
                <h3>Rebirth</h3>
                <p id="rebirth-status">Rebirths: 0 | Bonus: +0%</p>
                <p id="rebirth-next">Proximo em 250.000 pontos</p>
            </div>

            <!-- Botoes de menu -->
            <div class="top-menu">
                <button class="open-shop-btn" onclick="abrirLoja()">Loja</button>
                <button class="open-achievements-btn" onclick="abrirConquistas()">Conquistas</button>
                <button class="open-custom-btn" onclick="abrirPersonalizacao()">Personalizar</button>
                <button class="open-leaderboard-btn" onclick="abrirLeaderboard()">Leaderboard</button>
                <button class="open-settings-btn" onclick="abrirConfiguracoes()">Configuracoes</button>
            </div>
        </aside>
    </div>

    <!-- Alerta Personalizado -->
    <div id="customAlert" class="alert-overlay">
        <div class="alert-box">
            <h2>Congratulations!</h2>
            <div class="alert-image">
                <img src="assets/kanye/kanye-west.gif" alt="Kanye Celebration">
            </div>
            <p class="alert-message">You reached <span id="alertPoints">67</span> Kanye Points!</p>
            <button class="alert-btn" onclick="fecharAlert()">OK</button>
        </div>
    </div>

    <!-- Loja -->
    <div id="shop" class="shop-overlay">
        <div class="shop-box">
            <h2 class="shop-title">Loja</h2>
            <div class="shop-items" id="shop-items"></div>

            <button class="shop-close-btn" onclick="fecharLoja()">Fechar</button>
        </div>
    </div>
    <!-- Conquistas -->
    <div id="achievements" class="shop-overlay">
        <div class="shop-box">
            <h2 class="shop-title">Conquistas</h2>
            <div class="shop-items" id="lista-conquistas"></div>
            <div class="achievements-pagination">
                <button class="shop-btn page-btn" onclick="paginaAnteriorConquistas()">Anterior</button>
                <span id="achievements-page-info">Pagina 1 / 1</span>
                <button class="shop-btn page-btn" onclick="paginaProximaConquistas()">Proxima</button>
            </div>
            <button class="shop-close-btn" onclick="fecharConquistas()">Fechar</button>
        </div>
    </div>

    <!-- Personalizacao -->
    <div id="customization" class="shop-overlay">
        <div class="shop-box">
            <h2 class="shop-title">Personalizacao</h2>
            <div class="shop-items" id="lista-skins"></div>
            <button class="shop-close-btn" onclick="fecharPersonalizacao()">Fechar</button>
        </div>
    </div>

    <!-- Leaderboard -->
    <div id="leaderboard" class="shop-overlay">
        <div class="shop-box">
            <h2 class="shop-title">Leaderboard</h2>
            <div class="leaderboard-form">
                <p id="leaderboard-current-nickname" class="leaderboard-current-nickname">Nickname: Player</p>
            </div>
            <div class="shop-items" id="leaderboard-lista"></div>
            <button class="shop-close-btn" onclick="fecharLeaderboard()">Fechar</button>
        </div>
    </div>

    <!-- Configuracoes -->
    <div id="settings" class="shop-overlay">
        <div class="shop-box">
            <h2 class="shop-title">Configuracoes</h2>
            <div class="settings-grid">
                <label for="settings-nickname">Nickname</label>
                <input id="settings-nickname" type="text" maxlength="20" placeholder="Seu nickname">
                <label for="settings-volume">Volume da musica: <span id="settings-volume-value">45%</span></label>
                <input id="settings-volume" type="range" min="0" max="100" step="1" value="45" oninput="atualizarPreviewVolumeConfiguracoes(this.value)">
            </div>
            <button class="shop-btn settings-save-btn" onclick="salvarConfiguracoes()">Salvar configuracoes</button>
            <button class="shop-close-btn" onclick="fecharConfiguracoes()">Fechar</button>
        </div>
    </div>

    <!-- Loja de Musicas -->
    <div id="music-shop" class="shop-overlay">
        <div class="shop-box">
            <h2 class="shop-title">Loja de Musicas</h2>
            <div class="shop-items" id="lista-musicas"></div>
            <button class="shop-close-btn" onclick="fecharLojaMusicas()">Fechar</button>
        </div>
    </div>

    <!-- Botao flutuante: Musicas -->
    <button class="floating-music-btn" onclick="abrirLojaMusicas()" aria-label="Abrir loja de musicas">
        <img src="assets/items/caixadesom.png" alt="Loja de Musicas">
    </button>

    <!-- Botao flutuante: Rebirth -->
    <button id="rebirth-float-btn" class="rebirth-float-btn" onclick="tentarRebirth()" aria-label="Fazer rebirth">
        <img src="assets/items/KanyeButton.png" alt="Rebirth">
    </button>

    <script src="main.js"></script>
</body>
</html>
